<script>const FIREBASE_CONFIG={apiKey:"AIzaSyBO3HaX0rI37mUEwEWVu3soTW2GkAenZNo",authDomain:"bilgiarena-new.firebaseapp.com",projectId:"bilgiarena-new",storageBucket:"bilgiarena-new.firebasestorage.app",messagingSenderId:"1066315851875",appId:"1:1066315851875:web:7ddebd56fdccd04b41b056"};
// ═══════════════════════════════════════════════════════
// BİLGİ ARENA — FİREBASE BACKEND
// ═══════════════════════════════════════════════════════
// 
// KURULUM (5 dakika):
// 1. https://console.firebase.google.com → Proje oluştur
// 2. Authentication → Email/Şifre aktif et
// 3. Firestore Database → Üretim modunda oluştur
// 4. Proje Ayarları → Web uygulaması ekle → Config kopyala
// 5. Aşağıdaki FIREBASE_CONFIG bloğuna yapıştır
// ═══════════════════════════════════════════════════════

// ── Firebase başlat ──
let _fbApp=null, _fbAuth=null, _fbDB=null, _fbReady=false;
function initFirebase(){
  if(_fbReady) return true;
  if(typeof firebase==='undefined') return false;
  try{
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    _fbApp=firebase.app();
    _fbAuth=firebase.auth();
    _fbDB=firebase.firestore();
    _fbReady=true;
    console.log("✅ Firebase bağlandı");
    return true;
  }catch(e){console.warn("Firebase başlatılamadı:",e);return false;}
}

// ── Firestore helper ──
function db(){
  if(!_fbReady&&!initFirebase()) return null;
  return _fbDB;
}

// ═══════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════
async function fbRegister(email, password, username){
  if(!initFirebase()) return {ok:false,err:"Firebase bağlantısı yok"};
  try{
    // Check username unique
    const snap=await db().collection("usernames").doc(username).get();
    if(snap.exists) return {ok:false,err:"Bu kullanıcı adı zaten alınmış"};
    
    const cred=await _fbAuth.createUserWithEmailAndPassword(email, password);
    const uid=cred.user.uid;
    const code="#"+(100000+Math.floor(Math.random()*900000));
    const ref=getReferralCodeLocal(username);
    
    // Save user data
    await db().collection("users").doc(uid).set({
      username, email, uid,
      gold:1000, xp:0, level:1,
      avatar:{gender:'m',skinIdx:0,hairStyle:0,hairColorIdx:0,beardStyle:0,beardColorIdx:0,glassStyle:0,glassColorIdx:0},
      code, referralCode:ref,
      stats:{correct:0,games:0,wins:0,rooms:0,sci_correct:0,sport_correct:0,geo_correct:0,hist_correct:0,art_correct:0},
      friends:[], createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    // Reserve username
    await db().collection("usernames").doc(username).set({uid,code});
    
    // Cache locally
    cacheUser(uid,{username,gold:1000,xp:0,code,avatar:getAvatar(username)});
    return {ok:true, uid, username};
  }catch(e){
    const msgs={
      'auth/email-already-in-use':'Bu e-posta zaten kayıtlı',
      'auth/weak-password':'Şifre en az 6 karakter olmalı',
      'auth/invalid-email':'Geçersiz e-posta adresi',
    };
    return {ok:false, err:msgs[e.code]||e.message};
  }
}

async function fbLogin(email, password){
  if(!initFirebase()) return {ok:false,err:"Firebase bağlantısı yok"};
  try{
    const cred=await _fbAuth.signInWithEmailAndPassword(email, password);
    const uid=cred.user.uid;
    const doc=await db().collection("users").doc(uid).get();
    if(!doc.exists) return {ok:false,err:"Kullanıcı verisi bulunamadı"};
    const data=doc.data();
    cacheUser(uid, data);
    return {ok:true, uid, ...data};
  }catch(e){
    const msgs={
      'auth/user-not-found':'Bu e-posta ile kayıt bulunamadı',
      'auth/wrong-password':'Şifre hatalı',
      'auth/invalid-credential':'E-posta veya şifre hatalı',
      'auth/too-many-requests':'Çok fazla deneme. Biraz bekle.',
    };
    return {ok:false, err:msgs[e.code]||'Giriş başarısız'};
  }
}

function fbLogout(){
  if(_fbAuth) _fbAuth.signOut();
  localStorage.removeItem("ba_fb_uid");
  localStorage.removeItem("ba_fb_user");
}

function fbCurrentUser(){
  return _fbAuth?._fbAuth.currentUser||null;
}

// ── Local cache ──
function cacheUser(uid, data){
  try{
    localStorage.setItem("ba_fb_uid", uid);
    localStorage.setItem("ba_fb_user", JSON.stringify({uid,...data}));
  }catch(e){}
}
function getCachedUser(){
  try{
    const s=localStorage.getItem("ba_fb_user");
    return s?JSON.parse(s):null;
  }catch(e){return null;}
}

// ═══════════════════════════════════════════════════════
// USER DATA SYNC
// ═══════════════════════════════════════════════════════
async function fbSaveGold(uid, gold){
  saveGoldLS("__fb__", gold);
  if(!db()) return;
  try{await db().collection("users").doc(uid).update({gold});}catch(e){}
}
async function fbSaveXP(uid, xp, level){
  if(!db()) return;
  try{await db().collection("users").doc(uid).update({xp,level});}catch(e){}
}
async function fbSaveAvatar(uid, avatar){
  if(!db()) return;
  try{await db().collection("users").doc(uid).update({avatar});}catch(e){}
}
async function fbSaveStats(uid, stats){
  if(!db()) return;
  try{await db().collection("users").doc(uid).update({stats});}catch(e){}
}
async function fbSavePowers(uid, powers){
  if(!db()) return;
  try{await db().collection("users").doc(uid).update({powers});}catch(e){}
}

// Get fresh user data
async function fbGetUser(uid){
  if(!db()) return getCachedUser();
  try{
    const doc=await db().collection("users").doc(uid).get();
    if(doc.exists){const d={uid,...doc.data()};cacheUser(uid,d);return d;}
  }catch(e){}
  return getCachedUser();
}

// ═══════════════════════════════════════════════════════
// ROOM CODES (Cross-device!)
// ═══════════════════════════════════════════════════════
// Local helpers (same-device, in-memory + localStorage fallback)
function genRoomCode(){return String(Math.floor(100000+Math.random()*900000));}
function saveRoomCode(code,peerId){try{localStorage.setItem("ba_room_"+code,JSON.stringify({peerId,ts:Date.now()}));}catch(e){}}
function getRoomPeerId(code){try{const s=localStorage.getItem("ba_room_"+code);if(!s)return null;const d=JSON.parse(s);if(Date.now()-d.ts>7200000)return null;return d.peerId||null;}catch(e){return null;}}

async function fbSaveRoomCode(code, peerId){
  // Local (same device/network)
  saveRoomCode(code, peerId);
  // Cloud (cross-device)
  if(!db()) return;
  try{
    await db().collection("rooms").doc(code).set({
      peerId, createdAt:firebase.firestore.FieldValue.serverTimestamp(),
      expiresAt:new Date(Date.now()+2*60*60*1000)
    });
  }catch(e){}
}

async function fbGetRoomPeerId(code){
  // Try local first (faster)
  const local=getRoomPeerId(code);
  if(local) return local;
  // Try cloud
  if(!db()) return null;
  try{
    const doc=await db().collection("rooms").doc(code).get();
    if(doc.exists){
      const d=doc.data();
      if(d.expiresAt?.toDate()>new Date()) return d.peerId;
    }
  }catch(e){}
  return null;
}

// ═══════════════════════════════════════════════════════
// FRIENDS (Cross-device!)
// ═══════════════════════════════════════════════════════
async function fbAddFriend(uid, friendUid, friendUsername){
  if(!db()) return false;
  try{
    await db().collection("users").doc(uid).update({
      friends: firebase.firestore.FieldValue.arrayUnion({uid:friendUid,username:friendUsername})
    });
    return true;
  }catch(e){return false;}
}

async function fbGetFriends(uid){
  if(!db()) return [];
  try{
    const doc=await db().collection("users").doc(uid).get();
    return doc.exists?(doc.data().friends||[]):[];
  }catch(e){return [];}
}

async function fbSearchByCode(code){
  if(!db()) return null;
  try{
    const snap=await db().collection("usernames").where("code","==",code).limit(1).get();
    if(!snap.empty){const d=snap.docs[0].data();return {uid:d.uid,username:snap.docs[0].id,code};}
  }catch(e){}
  return null;
}

async function fbSearchByUsername(username){
  if(!db()) return null;
  try{
    const doc=await db().collection("usernames").doc(username).get();
    if(doc.exists){return {uid:doc.data().uid,username,code:doc.data().code};}
  }catch(e){}
  return null;
}

// ═══════════════════════════════════════════════════════
// MAÇ DAVETLERİ — Çoklu / Turnuva / Arena için kod ile davet
// ═══════════════════════════════════════════════════════
async function fbSendInvite(fromUid,fromUsername,fromCode,toUid,payload){
  if(!db()) return {ok:false,err:"Firebase yok"};
  try{
    await db().collection("invites").add({
      fromUid,fromUsername,fromCode,toUid,
      kind:(payload&&payload.kind)||'multi',
      payload:payload||{},
      ts:firebase.firestore.FieldValue.serverTimestamp(),
      createdAt:Date.now(),
      status:'pending'
    });
    return {ok:true};
  }catch(e){return {ok:false,err:e.message};}
}
async function fbListInvites(toUid){
  if(!db()) return [];
  try{
    const snap=await db().collection("invites").where("toUid","==",toUid).where("status","==","pending").limit(10).get();
    const now=Date.now();
    const out=[];
    for(const d of snap.docs){
      const data=d.data();
      // 5 dakikadan eski davetleri otomatik temizle
      if(data.createdAt&&(now-data.createdAt)>5*60*1000){
        try{await d.ref.delete();}catch(e){}
        continue;
      }
      out.push({id:d.id,...data});
    }
    return out;
  }catch(e){return [];}
}
async function fbDeleteInvite(id){
  if(!db()) return;
  try{await db().collection("invites").doc(id).delete();}catch(e){}
}

// ═══════════════════════════════════════════════════════
// ARKADAŞLIK İSTEKLERİ — kabul / reddet
// ═══════════════════════════════════════════════════════
async function fbSendFriendRequest(fromUid,fromUsername,fromCode,toUid){
  if(!db()) return {ok:false,err:"Firebase yok"};
  try{
    // Aynı isteği tekrar göndermesin
    const existing=await db().collection("friendRequests").where("fromUid","==",fromUid).where("toUid","==",toUid).where("status","==","pending").limit(1).get();
    if(!existing.empty)return {ok:false,err:"Zaten gönderdin"};
    await db().collection("friendRequests").add({
      fromUid,fromUsername,fromCode,toUid,
      ts:firebase.firestore.FieldValue.serverTimestamp(),
      createdAt:Date.now(),
      status:'pending'
    });
    return {ok:true};
  }catch(e){return {ok:false,err:e.message};}
}
async function fbListFriendRequests(toUid){
  if(!db()) return [];
  try{
    const snap=await db().collection("friendRequests").where("toUid","==",toUid).where("status","==","pending").limit(20).get();
    return snap.docs.map(d=>({id:d.id,...d.data()}));
  }catch(e){return [];}
}
async function fbAcceptFriendRequest(reqId,toUid,toUsername,fromUid,fromUsername){
  if(!db()) return false;
  try{
    const batch=db().batch();
    batch.update(db().collection("friendRequests").doc(reqId),{status:'accepted'});
    batch.update(db().collection("users").doc(toUid),{friends:firebase.firestore.FieldValue.arrayUnion({uid:fromUid,username:fromUsername})});
    batch.update(db().collection("users").doc(fromUid),{friends:firebase.firestore.FieldValue.arrayUnion({uid:toUid,username:toUsername})});
    await batch.commit();
    return true;
  }catch(e){return false;}
}
async function fbRejectFriendRequest(reqId){
  if(!db()) return false;
  try{await db().collection("friendRequests").doc(reqId).update({status:'rejected'});return true;}catch(e){return false;}
}

// ═══════════════════════════════════════════════════════
// LEAGUE (Real leaderboard!)
// ═══════════════════════════════════════════════════════
async function fbAddLeaguePts(uid, username, league, pts){
  if(!db()) return;
  const weekKey=getWeekKey();
  try{
    const ref=db().collection("leagues").doc(weekKey).collection("scores").doc(uid);
    const doc=await ref.get();
    const cur=doc.exists?doc.data():{username,pts:0,league,uid};
    const newPts=(cur.pts||0)+pts;
    const newLeague=getNewLeague(newPts);
    await ref.set({username,pts:newPts,league:newLeague,uid,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
  }catch(e){}
}

async function fbGetLeagueBoard(leagueId, uid){
  if(!db()) return null;
  const weekKey=getWeekKey();
  try{
    const snap=await db().collection("leagues").doc(weekKey).collection("scores")
      .where("league","==",leagueId).orderBy("pts","desc").limit(20).get();
    return snap.docs.map(d=>({...d.data(),isMe:d.id===uid}));
  }catch(e){return null;}
}

function getNewLeague(pts){
  for(let i=LEAGUES.length-1;i>=0;i--){if(pts>=LEAGUES[i].minPts)return LEAGUES[i].id;}
  return 'bronze';
}

// ═══════════════════════════════════════════════════════
// REFERRAL (Real cross-device!)
// ═══════════════════════════════════════════════════════
function getReferralCodeLocal(username){
  return 'REF'+Math.random().toString(36).substr(2,6).toUpperCase();
}

async function fbApplyReferral(uid, username, refCode){
  if(!db()) return {ok:false,msg:"Firebase bağlantısı yok"};
  try{
    // Check already used
    const userDoc=await db().collection("users").doc(uid).get();
    if(userDoc.data()?.referralUsed) return {ok:false,msg:"Davet kodunu zaten kullandınız"};
    // Find referrer
    const snap=await db().collection("users").where("referralCode","==",refCode).limit(1).get();
    if(snap.empty) return {ok:false,msg:"Geçersiz davet kodu"};
    const referrerDoc=snap.docs[0];
    if(referrerDoc.id===uid) return {ok:false,msg:"Kendi kodunuzu kullanamazsınız"};
    // Apply rewards
    const batch=db().batch();
    batch.update(db().collection("users").doc(uid),{
      gold:firebase.firestore.FieldValue.increment(200), referralUsed:refCode
    });
    batch.update(db().collection("users").doc(referrerDoc.id),{
      gold:firebase.firestore.FieldValue.increment(100),
      referralCount:firebase.firestore.FieldValue.increment(1)
    });
    await batch.commit();
    return {ok:true,msg:"Davet kodu uygulandı! +200 🪙 kazandın!"};
  }catch(e){return {ok:false,msg:"Hata: "+e.message};}
}

// ═══════════════════════════════════════════════════════
// ONLINE STATUS
// ═══════════════════════════════════════════════════════
async function fbSetOnline(uid){
  if(!db()) return;
  try{
    await db().collection("online").doc(uid).set({
      ts:firebase.firestore.FieldValue.serverTimestamp(),at:Date.now()
    });
  }catch(e){}
}
async function fbIsOnline(uid){
  if(!db()) return isOnline(uid); // fallback to localStorage
  try{
    const doc=await db().collection("online").doc(uid).get();
    if(doc.exists) return(Date.now()-doc.data().at)<120000;
  }catch(e){}
  return false;
}

// ── Level system ──
function getLvlXP(lv){return Math.floor(100*Math.pow(1.48,lv-1));}
function calcLevelInfo(totalXP){
  let lv=1,rem=totalXP;
  while(lv<100){const need=getLvlXP(lv);if(rem<need)break;rem-=need;lv++;}
  return{level:lv,currentXP:rem,neededXP:getLvlXP(lv)};
}
function getLevelRewards(lv){
  const r=[{type:'gold',amount:50*lv}];
  const fr=getFrame(lv);
  if(lv%5===0){if(fr)r.push({type:'frame',name:fr.name,color:fr.c});r.push({type:'gold',amount:150*lv});}
  if(lv%10===0){['double','elim','x2'].forEach(p=>r.push({type:'power',pw:p}));}
  return r;
}
function getTotalXP(u){try{return parseInt(localStorage.getItem("ba_xp_"+u)||"0");}catch(e){return 0;}}
function saveTotalXP(u,v){try{localStorage.setItem("ba_xp_"+u,String(v));}catch(e){}}

// ── Seeded shuffle ──
function seededShuffle(arr,seed){
  let s=0;for(let i=0;i<seed.length;i++)s=(s*31+seed.charCodeAt(i))&0x7fffffff;
  const r=arr.map((v,i)=>({v,i}));
  for(let i=r.length-1;i>0;i--){s=(s*1664525+1013904223)&0x7fffffff;const j=Math.abs(s)%(i+1);[r[i],r[j]]=[r[j],r[i]];}
  return r;
}

let _ac=null,_musicNodes=[],_musicGain=null,_sfxOn=true,_musicOn=true,_songIdx=0,_musicTO=null;

// Genişletilmiş ses paleti — daha dolgun, oyun-içi efektlerle dolu
function _tone(c,g,freq,dt,dur,type,vol){const o=c.createOscillator();o.connect(g);o.type=type||'sine';if(typeof freq==='function')freq(o,c.currentTime+dt);else o.frequency.value=freq;const v=vol==null?.2:vol;g.gain.setValueAtTime(0,c.currentTime+dt);g.gain.linearRampToValueAtTime(v,c.currentTime+dt+.012);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+dt+dur);o.start(c.currentTime+dt);o.stop(c.currentTime+dt+dur+.02);}
function _noise(c,gout,dt,dur,vol){try{const bs=c.sampleRate*dur,b=c.createBuffer(1,bs,c.sampleRate),d=b.getChannelData(0);for(let i=0;i<bs;i++)d[i]=(Math.random()*2-1)*(1-i/bs);const s=c.createBufferSource();s.buffer=b;const g=c.createGain();g.gain.value=vol==null?.12:vol;s.connect(g);g.connect(gout);s.start(c.currentTime+dt);}catch(e){}}
// Rastgele varyant seç
const _pick=arr=>arr[Math.floor(Math.random()*arr.length)];
// Hızlı kick/snare/hi-hat tarzı perküsyon (drum)
function _kick(c,g,dt,vol){const o=c.createOscillator();o.connect(g);o.type='sine';o.frequency.setValueAtTime(140,c.currentTime+dt);o.frequency.exponentialRampToValueAtTime(40,c.currentTime+dt+.10);g.gain.setValueAtTime(0,c.currentTime+dt);g.gain.linearRampToValueAtTime(vol||.28,c.currentTime+dt+.005);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+dt+.14);o.start(c.currentTime+dt);o.stop(c.currentTime+dt+.16);}
function _hat(c,gout,dt,vol){_noise(c,gout,dt,.04,vol||.06);}
function playSfx(type,opts){
  if(!_sfxOn)return;
  try{const c=_getAC(),g=c.createGain();g.connect(c.destination);
    if(type==='correct'){
      // 4 farklı doğru-cevap varyantı (rastgele) — hep neşeli major arpejler
      const variants=[
        [[0,523],[.05,659],[.10,784],[.15,1047]],            // C-E-G-C
        [[0,659],[.05,830],[.10,988],[.15,1319]],            // E-G#-B-E (parlak)
        [[0,587],[.04,740],[.08,880],[.12,1175],[.18,1480]], // D-F#-A-D-F# (5'li)
        [[0,698],[.05,880],[.10,1047],[.15,1319]],           // F-A-C-E
        [[0,523],[.04,659],[.08,784],[.12,1047],[.16,1319]]  // hızlı 5-nota
      ];
      const v=_pick(variants);
      v.forEach(([dt,f])=>_tone(c,g,f,dt,.18,'triangle',.24));
      // Tatlı bir "ding" tepesi
      _tone(c,g,v[v.length-1][1]*2,v[v.length-1][0]+.04,.10,'sine',.10);
    }
    else if(type==='wrong'){
      // 3 farklı yanlış-cevap varyantı (alaycı/komik)
      const variants=[
        [[0,330],[.10,247],[.20,196]],                  // alçalan
        [[0,392],[.08,294],[.16,247]],                  // hafif alçalan
        [[0,440],[.06,277]]                             // sert iki-tonlu "buzzer"
      ];
      const v=_pick(variants);
      v.forEach(([dt,f])=>_tone(c,g,f,dt,.20,'sawtooth',.18));
      _noise(c,g,0,.06,.05);
    }
    else if(type==='spend'){_tone(c,g,o=>{o.frequency.setValueAtTime(720,c.currentTime);o.frequency.exponentialRampToValueAtTime(200,c.currentTime+.18);},0,.2,'sine',.22);}
    else if(type==='earn'){[[0,523],[.06,659],[.12,880],[.18,1175]].forEach(([dt,f])=>_tone(c,g,f,dt,.16,'triangle',.22));_kick(c,g,0,.10);}
    else if(type==='levelup'){[[0,523],[.06,659],[.12,784],[.18,1047],[.26,1319],[.34,1568],[.44,2093]].forEach(([dt,f])=>_tone(c,g,f,dt,.26,'triangle',.26));}
    else if(type==='click'){
      // Punchy, varyantlı tıklama
      const variants=[
        [[0,1100,'square',.10],[.005,1500,'square',.06]],
        [[0,1300,'square',.10],[.005,1900,'square',.06]],
        [[0,900,'triangle',.12],[.005,1350,'triangle',.07]],
        [[0,1500,'square',.09],[.008,2000,'square',.05]]
      ];
      _pick(variants).forEach(([dt,f,t,v])=>_tone(c,g,f,dt,.04,t,v));
    }
    else if(type==='tab'){
      // Sekme/menü değişim — neşeli iki-tonlu pop
      const variants=[
        [[0,420],[.04,640]],
        [[0,520],[.04,780]],
        [[0,460],[.05,690]]
      ];
      _pick(variants).forEach(([dt,f])=>_tone(c,g,f,dt,.07,'triangle',.14));
    }
    else if(type==='swoosh'){_noise(c,g,0,.16,.08);_tone(c,g,o=>{o.frequency.setValueAtTime(220,c.currentTime);o.frequency.exponentialRampToValueAtTime(60,c.currentTime+.16);},0,.16,'sine',.08);}
    else if(type==='notify'){[[0,880],[.08,1175],[.16,1480]].forEach(([dt,f])=>_tone(c,g,f,dt,.14,'sine',.18));}
    else if(type==='invite'){[[0,659],[.06,880],[.12,1175],[.18,1480],[.26,1760]].forEach(([dt,f])=>_tone(c,g,f,dt,.18,'triangle',.20));}
    else if(type==='accept'){[[0,659],[.06,784],[.14,1047]].forEach(([dt,f])=>_tone(c,g,f,dt,.18,'triangle',.24));}
    else if(type==='reject'){[[0,440],[.08,330],[.16,247]].forEach(([dt,f])=>_tone(c,g,f,dt,.18,'sawtooth',.18));}
    else if(type==='match-start'){
      // Coşkulu maç başlangıcı — fanfar + kick
      [[0,523],[.05,659],[.10,784],[.16,1047],[.24,1319],[.32,1568]].forEach(([dt,f])=>_tone(c,g,f,dt,.20,'triangle',.24));
      _kick(c,g,0,.18);_kick(c,g,.16,.16);_kick(c,g,.32,.18);
    }
    else if(type==='win'){
      // Zafer — uzun tatlı arpej + drumroll
      [[0,523],[.05,659],[.11,784],[.18,1047],[.28,1319],[.40,1047],[.50,1568],[.62,2093]].forEach(([dt,f])=>_tone(c,g,f,dt,.30,'triangle',.26));
      [0,.10,.20,.30].forEach(d=>_kick(c,g,d,.14));
    }
    else if(type==='lose'){
      // Hüzünlü düşüş
      [[0,392],[.16,330],[.32,247],[.50,196],[.70,165]].forEach(([dt,f])=>_tone(c,g,f,dt,.28,'sawtooth',.20));
    }
    else if(type==='join'){[[0,587],[.06,784]].forEach(([dt,f])=>_tone(c,g,f,dt,.14,'sine',.18));}
    else if(type==='leave'){[[0,440],[.06,330]].forEach(([dt,f])=>_tone(c,g,f,dt,.16,'sine',.16));}
    else if(type==='tick'){_tone(c,g,1200,0,.04,'square',.08);}
    else if(type==='tick-final'){_tone(c,g,1700,0,.08,'square',.18);_hat(c,g,0,.05);}
    else if(type==='combo'){[[0,880],[.04,1175],[.08,1480],[.12,1760],[.18,2093]].forEach(([dt,f])=>_tone(c,g,f,dt,.10,'triangle',.20));_hat(c,g,0,.06);}
    else if(type==='combo-mega'){
      // Görkemli mega-combo (5+) sesi: yükselen flourish + drum-roll + parlak shimmer
      const n=(opts&&opts.n)||5;
      const base=523;
      // Hızlı yükselen 8-nota arpej (E majör scale up)
      [0,.04,.08,.12,.16,.20,.25,.30].forEach((dt,i)=>{
        _tone(c,g,base*Math.pow(1.122,i),dt,.18,'triangle',.26);
      });
      // Üst oktav shimmer
      [0,.06,.12,.18].forEach((dt,i)=>{
        _tone(c,g,base*4*Math.pow(1.25,i),dt,.16,'sine',.14);
      });
      // 4 darbe drum-roll
      [0,.08,.16,.24].forEach(d=>_kick(c,g,d,.20));
      // Hi-hat shimmer
      [0,.10,.20,.30].forEach(d=>_hat(c,g,d,.07));
      // Combo seviyesi 7+ ise ekstra "ding"
      if(n>=7){_tone(c,g,2349,.32,.22,'sine',.18);_tone(c,g,3136,.40,.20,'sine',.14);}
    }
    else if(type==='powerup'){[[0,440],[.04,659],[.08,880],[.14,1175],[.20,1568]].forEach(([dt,f])=>_tone(c,g,f,dt,.14,'triangle',.22));_hat(c,g,.02,.05);}
    else if(type==='qstart'){
      // Her soruya özel — qIdx'e göre farklı majör arpej + perküsyon
      const idx=(opts&&typeof opts.idx==='number')?opts.idx:0;
      const scales=[
        [523,659,784],   [659,784,988],   [587,740,880],  [698,880,1047],
        [784,988,1175],  [880,1047,1319], [523,698,880],  [659,830,988],
        [587,784,988],   [698,1047,1319]
      ];
      const sc=scales[Math.abs(idx)%scales.length];
      sc.forEach((f,i)=>_tone(c,g,f,i*.05,.12,'triangle',.18));
      _hat(c,g,0,.04);
    }
  }catch(e){}
}

const _n2f=n=>440*Math.pow(2,(n-69)/12);
// Eğlenceli, hızlı chiptune fon parçaları — bas hattı + melodi + hi-hat
// notes: [midi, beat-duration]
const _SONGS=[
  // Coşkulu major - 150 bpm
  {bpm:150,vol:.045,
    melody:[[64,1],[67,1],[71,1],[72,2],[71,1],[69,1],[67,2],[64,1],[67,1],[71,1],[74,2],[72,1],[71,1],[69,4]],
    bass:  [[40,2],[40,2],[45,2],[45,2],[43,2],[43,2],[38,2],[38,2]]},
  // Tempolu, parlak - 168 bpm
  {bpm:168,vol:.045,
    melody:[[72,1],[76,1],[79,1],[76,1],[72,2],[74,1],[76,1],[79,1],[83,1],[81,1],[79,1],[76,2],[74,2],[72,2]],
    bass:  [[36,2],[36,2],[41,2],[41,2],[40,2],[40,2],[36,4]]},
  // Funky - 138 bpm
  {bpm:138,vol:.045,
    melody:[[67,1],[69,1],[71,1],[72,1],[74,2],[72,1],[71,1],[69,2],[67,1],[64,1],[67,2],[69,1],[71,1],[72,4]],
    bass:  [[43,1],[43,1],[48,2],[43,1],[43,1],[45,2],[43,1],[43,1],[40,2],[43,2]]},
  // Heyecanlı - 160 bpm
  {bpm:160,vol:.045,
    melody:[[60,1],[64,1],[67,1],[72,1],[71,1],[67,1],[64,2],[60,1],[64,1],[67,1],[72,2],[74,1],[72,1],[71,4]],
    bass:  [[36,2],[40,2],[43,2],[36,2],[40,2],[43,2],[41,2],[36,2]]},
  // Neşeli pop - 144 bpm
  {bpm:144,vol:.045,
    melody:[[69,1],[72,1],[76,1],[72,1],[69,2],[71,1],[72,1],[74,2],[72,1],[71,1],[69,2],[67,1],[69,1],[72,4]],
    bass:  [[45,2],[45,2],[50,2],[50,2],[43,2],[43,2],[41,2],[45,2]]},
];
function playMusic(idx){
  stopMusic();if(!_musicOn)return;
  try{
    const c=_getAC();
    const N=_SONGS.length;
    const song=_SONGS[((idx%N)+N)%N];
    const beat=60/song.bpm;
    _musicGain=c.createGain();_musicGain.gain.value=song.vol;_musicGain.connect(c.destination);
    let t=c.currentTime+.15;
    let totalDur=0;
    // Melodi (üstte triangle, altında lo-pass sine harmonisi)
    for(let rep=0;rep<2;rep++){
      song.melody.forEach(([note,dur])=>{
        const o=c.createOscillator(),g2=c.createGain();
        o.connect(g2);g2.connect(_musicGain);
        o.type=rep===0?'triangle':'sine';
        o.frequency.value=_n2f(note+(rep===1?12:0));
        const startT=t;
        const endT=t+beat*dur;
        g2.gain.setValueAtTime(0,startT);
        g2.gain.linearRampToValueAtTime(rep===0?1:.4,startT+.02);
        g2.gain.setValueAtTime(rep===0?1:.4,endT-beat*dur*.25);
        g2.gain.linearRampToValueAtTime(0,endT-.005);
        o.start(startT);o.stop(endT+.02);
        _musicNodes.push(o);
        if(rep===0)t+=beat*dur;
      });
      if(rep===0)totalDur=t-c.currentTime-.15;
      if(rep===1)t=c.currentTime+.15;  // 2. tur melodi başlangıçtan itibaren paralel
    }
    // Bas hattı — düşük frekans sine
    let bt=c.currentTime+.15;
    if(song.bass){
      for(let br=0;br<2;br++){
        song.bass.forEach(([note,dur])=>{
          const bo=c.createOscillator(),bg=c.createGain();
          bo.connect(bg);bg.connect(_musicGain);
          bo.type='sine';
          bo.frequency.value=_n2f(note);
          bg.gain.setValueAtTime(0,bt);
          bg.gain.linearRampToValueAtTime(.55,bt+.01);
          bg.gain.setValueAtTime(.55,bt+beat*dur*.7);
          bg.gain.linearRampToValueAtTime(0,bt+beat*dur*.99);
          bo.start(bt);bo.stop(bt+beat*dur+.01);
          _musicNodes.push(bo);
          bt+=beat*dur;
        });
      }
    }
    // Hafif hi-hat (ses dolgunluğu)
    let ht=c.currentTime+.15;
    while(ht<c.currentTime+.15+totalDur){
      _noise(c,_musicGain,ht-c.currentTime,.03,.04);
      ht+=beat*.5;
    }
    _musicTO=setTimeout(()=>{_songIdx=(_songIdx+1)%N;playMusic(_songIdx);},(totalDur+.1)*1000);
  }catch(e){}
}
function stopMusic(){clearTimeout(_musicTO);_musicNodes.forEach(n=>{try{n.stop();}catch(e){}});_musicNodes=[];if(_musicGain){try{_musicGain.disconnect();}catch(e){}_musicGain=null;}}
function setMusicEnabledG(v){_musicOn=v;if(!v)stopMusic();else playMusic(_songIdx);}

// ── Question seen tracker (anti-repeat) ──
function getSeenQs(u){
  try{const s=localStorage.getItem("ba_seen_"+u);return s?JSON.parse(s):[];}
  catch(e){return[];}
}
function addSeenQs(u,newIds){
  try{
    let seen=getSeenQs(u);
    seen=[...seen,...newIds];
    // Keep only last 100
    if(seen.length>100)seen=seen.slice(seen.length-100);
    localStorage.setItem("ba_seen_"+u,JSON.stringify(seen));
  }catch(e){}
}
function getQsByCategory(cat,count,username){
  const pool=[...(ALL_QS[cat]||ALL_QS.karışık)];
  const seen=username?getSeenQs(username):[];
  // Unseen questions first
  const unseen=pool.filter((_,i)=>!seen.includes(cat+"_"+i));
  const seenPool=pool.filter((_,i)=>seen.includes(cat+"_"+i));
  const shuffled=[
    ...[...unseen].sort(()=>Math.random()-.5),
    ...[...seenPool].sort(()=>Math.random()-.5)
  ];
  const selected=shuffled.slice(0,count);
  // Track selected indices
  if(username){
    const indices=selected.map(q=>cat+"_"+pool.indexOf(q));
    addSeenQs(username,indices);
  }
  return selected;
}

// ── Weekly League ──
const LEAGUES=[
  {id:'bronze',  name:'Bronz',   icon:'🥉', color:'#CD7F32', minPts:0,    maxPts:499,  slots:20},
  {id:'silver',  name:'Gümüş',   icon:'🥈', color:'#C0C0C0', minPts:500,  maxPts:1499, slots:20},

  {id:'master',  name:'Usta',    icon:'👑', color:'#9d50ff', minPts:6000, maxPts:99999,slots:10},
];
function getWeekKey(){
  const d=new Date(); const jan1=new Date(d.getFullYear(),0,1);
  return d.getFullYear()+'W'+Math.ceil((((d-jan1)/86400000)+jan1.getDay()+1)/7);
}
function getLeagueData(u){
  try{const s=localStorage.getItem('ba_league_'+u);return s?JSON.parse(s):{league:'bronze',weeklyPts:0,weekKey:getWeekKey(),prevLeague:'bronze'};}
  catch(e){return{league:'bronze',weeklyPts:0,weekKey:getWeekKey(),prevLeague:'bronze'};}
}
function saveLeagueData(u,v){try{localStorage.setItem('ba_league_'+u,JSON.stringify(v));}catch(e){}}
function addLeaguePts(u,pts){
  let d=getLeagueData(u);
  // New week reset
  if(d.weekKey!==getWeekKey()){d.prevLeague=d.league;d.weeklyPts=0;d.weekKey=getWeekKey();}
  d.weeklyPts=(d.weeklyPts||0)+pts;
  // Promotion check
  for(let i=LEAGUES.length-1;i>=0;i--){
    if(d.weeklyPts>=LEAGUES[i].minPts){d.league=LEAGUES[i].id;break;}
  }
  saveLeagueData(u,d);
  return d;
}
function getLeagueObj(id){return LEAGUES.find(l=>l.id===id)||LEAGUES[0];}

// Fake leaderboard for the same league (simulated opponents)
const FAKE_NAMES=['Ahmet_K','Zeynep_A','Mert_Y','Elif_S','Can_T','Ayse_D','Burak_O','Selin_K','Ozan_M','Hande_G','Furkan_B','Nisa_Y','Arda_T','Ceren_A','Kaan_S','Irem_K','Baran_O','Dilara_M','Emre_C','Buse_T'];
// Bot havuzu — turnuva, çoklu mod ve arena için. İleride matchmaking API'sine bağlanacak.
const BOT_POOL=['Ahmet 🤖','Zeynep 🤖','Mehmet 🤖','Ayşe 🤖','Hasan 🤖','Elif 🤖','Mustafa 🤖','Fatma 🤖','Cem 🤖','Selin 🤖','Burak 🤖','Nisa 🤖','Arda 🤖','Ceren 🤖','Kaan 🤖','İrem 🤖','Baran 🤖','Dilara 🤖','Emre 🤖','Buse 🤖','Tolga 🤖','Pınar 🤖','Tarkan 🤖','Yağmur 🤖','Onur 🤖','Berk 🤖','Sude 🤖','Doruk 🤖','Sıla 🤖','Kerem 🤖'];
function isBot(name){return typeof name==='string'&&name.indexOf('🤖')!==-1;}
// Hariç tutulanlar dışında n adet rastgele bot ismi döndürür.
function getRandomOpponents(n,exclude){
  const ex=new Set(exclude||[]);
  const pool=BOT_POOL.filter(b=>!ex.has(b));
  const sh=pool.sort(()=>Math.random()-.5);
  return sh.slice(0,Math.max(0,n));
}
// Yerel olarak çevrimiçi gözüken kullanıcıları tarar (ba_online_<user> = timestamp).
// İleride Firebase'in 'online' koleksiyonuyla zenginleştirilecek.
function getOnlineUsers(){
  try{
    const now=Date.now();const out=[];
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(!k||!k.startsWith('ba_online_'))continue;
      const v=parseInt(localStorage.getItem(k)||'0');
      if(now-v<120000) out.push(k.substring('ba_online_'.length));
    }
    return out;
  }catch(e){return [];}
}
function getFakeLeaderboard(userPts,leagueId,username){
  const seed=leagueId+getWeekKey();
  let h=0;for(const c of seed)h=(h*31+c.charCodeAt(0))>>>0;
  const rng=()=>{h=((h*1664525+1013904223)>>>0);return(h>>>0)/0xFFFFFFFF;};
  const league=getLeagueObj(leagueId);
  const count=Math.min(19,league.slots-1);
  const opponents=[];
  const usedNames=new Set();
  for(let i=0;i<count;i++){
    const ni=Math.floor(rng()*FAKE_NAMES.length);
    const name=FAKE_NAMES[ni]+(usedNames.has(ni)?'_'+i:'');
    usedNames.add(ni);
    const pts=Math.floor(rng()*(league.maxPts-league.minPts))+league.minPts;
    opponents.push({name,pts,isMe:false});
  }
  opponents.push({name:username,pts:userPts,isMe:true});
  return opponents.sort((a,b)=>b.pts-a.pts);
}

// ── Referral System ──
function getReferralCode(u){
  try{
    let c=localStorage.getItem('ba_ref_'+u);
    if(!c){c='REF'+Math.random().toString(36).substr(2,6).toUpperCase();localStorage.setItem('ba_ref_'+u,c);}
    return c;
  }catch(e){return 'REFXXXXX';}
}
function applyReferral(u,code){
  try{
    // Check not self-referral
    if(getReferralCode(u)===code)return{ok:false,msg:'Kendi kodunuzu kullanamazsınız'};
    // Check already used
    if(localStorage.getItem('ba_ref_used_'+u))return{ok:false,msg:'Davet kodu zaten kullandınız'};
    // Check valid code (any user who has this code)
    let found=null;
    for(let i=0;i<localStorage.length;i++){
      const key=localStorage.key(i);
      if(key&&key.startsWith('ba_ref_')&&!key.includes('used_')){
        const val=localStorage.getItem(key);
        if(val===code){found=key.replace('ba_ref_','');break;}
      }
    }
    if(!found)return{ok:false,msg:'Geçersiz davet kodu'};
    // Mark used
    localStorage.setItem('ba_ref_used_'+u,'1');
    // Reward both
    const curGold=parseInt(localStorage.getItem('ba_gold_'+u)||'1000');
    localStorage.setItem('ba_gold_'+u,String(curGold+200));
    const refGold=parseInt(localStorage.getItem('ba_gold_'+found)||'1000');
    localStorage.setItem('ba_gold_'+found,String(refGold+100));
    // Track referral count for referrer
    const cnt=parseInt(localStorage.getItem('ba_ref_count_'+found)||'0')+1;
    localStorage.setItem('ba_ref_count_'+found,String(cnt));
    return{ok:true,msg:'Davet kodu uygulandı! +200 🪙 kazandın!'};
  }catch(e){return{ok:false,msg:'Hata oluştu'};}
}
function getReferralCount(u){try{return parseInt(localStorage.getItem('ba_ref_count_'+u)||'0');}catch(e){return 0;}}
function hasUsedReferral(u){try{return localStorage.getItem('ba_ref_used_'+u)==='1';}catch(e){return false;}}

// ── Statistics ──
function getDetailedStats(u){
  try{const s=localStorage.getItem('ba_stats_'+u);return s?JSON.parse(s):{correct:0,games:0,wins:0,rooms:0,sci_correct:0,sport_correct:0,geo_correct:0,hist_correct:0,art_correct:0};}
  catch(e){return{correct:0,games:0,wins:0,rooms:0,sci_correct:0,sport_correct:0,geo_correct:0,hist_correct:0,art_correct:0};}
}
function getWeeklyHistory(u){
  try{const s=localStorage.getItem('ba_history_'+u);return s?JSON.parse(s):[];}
  catch(e){return[];}
}
function addGameHistory(u,pts,correct,total){
  try{
    const h=getWeeklyHistory(u);
    h.push({d:new Date().toISOString().split('T')[0],pts,correct,total});
    if(h.length>30)h.shift();
    localStorage.setItem('ba_history_'+u,JSON.stringify(h));
  }catch(e){}
}

// -- Confetti --
function Confetti(){
  const ref=useRef(null);
  useEffect(()=>{
    const cv=ref.current;if(!cv)return;
    const ctx=cv.getContext('2d');cv.width=390;cv.height=500;
    const P=Array.from({length:80},()=>({x:Math.random()*390,y:-30-Math.random()*80,vx:(Math.random()-.5)*5,vy:1.5+Math.random()*3.5,w:8+Math.random()*8,h:4+Math.random()*4,rot:Math.random()*360,rv:(Math.random()-.5)*8,col:['#34d399','#fbbf24','#34d399','#f87171','#f59e0b','#fbbf24'][Math.floor(Math.random()*6)]}));
    let raf,done=false;
    const tick=()=>{ctx.clearRect(0,0,390,500);let any=false;P.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.rot+=p.rv;p.vy+=.07;if(p.y<520)any=true;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.col;ctx.globalAlpha=Math.max(0,1-p.y/480);ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();});if(any&&!done)raf=requestAnimationFrame(tick);};
    tick();return()=>{done=true;cancelAnimationFrame(raf);};
  },[]);
  return <canvas ref={ref} style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:50}}/>;
}

            <div key={i} style={{background:"#17352f",border:"1.5px solid #244d43",borderRadius:10,padding:"9px 13px",marginBottom:6,display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:20}}>{r.type==='gold'?"🪙":r.type==='frame'?"🖼️":"⚡"}</span>
              <span style={{fontSize:13,fontWeight:700,color:"#e2e4f0"}}>{r.type==='gold'?"+"+r.amount+" Altın":r.type==='frame'?r.name+" Çerçeve":{double:"🎯 Çift Seçim",elim:"❌ 2 Yanlışı Ele",x2:"⚡ x2 Puan"}[r.pw]||r.pw}</span>
            </div>
          ))}
        </div>
        <button onClick={onClose} style={{background:"linear-gradient(135deg,#fbbf24,#f59e0b)",border:"none",borderRadius:14,padding:"13px",color:"#071714",fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:800,fontSize:15,cursor:"pointer",width:"100%"}}>Devam Et →</button>
      </div>
    </div>
  );
}

// -- Main App --
function App(){
  const [screen,setScreen]=useState("auth");
  const [authTab,setAuthTab]=useState("login");
  const [fUser,setFUser]=useState("");
  const [fPass,setFPass]=useState("");
  const [fErr,setFErr]=useState("");
  const [username,setUsername]=useState("");
  const [avatar,setAvatar]=useState({gender:'m',skinIdx:0,hairStyle:0,hairColorIdx:0,beardStyle:0,beardColorIdx:0});

  // game config
  const [mode,setMode]=useState("solo");
  const [qCount,setQCount]=useState(7);
  const [category,setCategory]=useState("karışık");

  // multiplayer
  const [inviteLink,setInviteLink]=useState("");
  const [roomCode,setRoomCode]=useState("");
  const [roomPlayers,setRoomPlayers]=useState([]);
  const [connStatus,setConnStatus]=useState("idle");
  const [copied,setCopied]=useState(false);

  // game state
  const [questions,setQuestions]=useState([]);
  const [qIdx,setQIdx]=useState(0);
  const [sel,setSel]=useState(null);
  const [sel2,setSel2]=useState(null);
  const [tl,setTl]=useState(15);
  const [score,setScore]=useState(0);
  const [answers,setAnswers]=useState([]);
  const [feedback,setFeedback]=useState(false);
  const [revealed,setRevealed]=useState(false);
  const [liveScores,setLiveScores]=useState({});
  const [waiting,setWaiting]=useState(false);
  const [waitCount,setWaitCount]=useState({answered:0,total:1});
  const [shuffled,setShuffled]=useState([]);
  const [eliminated,setEliminated]=useState([]);

  // economy & progression
  const [gold,setGold]=useState(1000);
  const [powers,setPowers]=useState({double:0,elim:0,x2:0});
  const [pwDouble,setPwDouble]=useState(false);
  const [pwElim,setPwElim]=useState(false);
  const [pwX2,setPwX2]=useState(false);
  const [totalXP,setTotalXP]=useState(0);
  const [levelInfo,setLevelInfo]=useState({level:1,currentXP:0,neededXP:100});
  const [stats,setStats]=useState({correct:0,games:0,wins:0,rooms:0});
  const [missions,setMissions]=useState({});
  const [dailyData,setDailyData]=useState({done:{},pts:0,chestClaimed:false});
  const [userTitle,setUserTitle]=useState("");
  const [goldEarned,setGoldEarned]=useState(0);
  const [comboCount,setComboCount]=useState(0);
  const [comboBlast,setComboBlast]=useState(null); // {n, xp, t} — 5+ combo özel animasyonu
  const [adaptiveDiff,setAdaptiveDiff]=useState("orta");
  const [answerHistory,setAnswerHistory]=useState([]);
  const [lang,setLang]=useState((()=>{try{return localStorage.getItem("ba_lang")||"tr";}catch(e){return "tr";}})());
  const [kickedPlayers,setKickedPlayers]=useState([]);

  // friends
  const [friends,setFriends]=useState([]);
  const [friendSearchInput,setFriendSearchInput]=useState("");
  const [friendSearchResult,setFriendSearchResult]=useState(null);
  const [friendSearchErr,setFriendSearchErr]=useState("");

  // UI
  const [homeTab,setHomeTab]=useState("home");
  const [showShop,setShowShop]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [showAvEd,setShowAvEd]=useState(false);
  const [sfxOn,setSfxOn]=useState((()=>{try{const v=localStorage.getItem("ba_sfx");return v===null?true:v==="1";}catch(e){return true;}})());
  const [musicOn,setMusicOn]=useState((()=>{try{const v=localStorage.getItem("ba_music");return v===null?true:v==="1";}catch(e){return true;}})());
  const [vibrateOn,setVibrateOn]=useState((()=>{try{const v=localStorage.getItem("ba_vib");return v===null?true:v==="1";}catch(e){return true;}})());
  const [notifOn,setNotifOn]=useState((()=>{try{const v=localStorage.getItem("ba_notif");return v===null?true:v==="1";}catch(e){return true;}})());
  const [reduceMotion,setReduceMotion]=useState((()=>{try{return localStorage.getItem("ba_reduceMotion")==="1";}catch(e){return false;}})());
  const [fontSize,setFontSize]=useState((()=>{try{return localStorage.getItem("ba_fontSize")||"md";}catch(e){return "md";}})());
  const [musicStarted,setMusicStarted]=useState(false);
  const [levelUpQueue,setLevelUpQueue]=useState([]);
  const [chestModal,setChestModal]=useState(false);
  const [gmailInput,setGmailInput]=useState("");
  const [authLoading,setAuthLoading]=useState(false);
  const [fEmail,setFEmail]=useState("");
  const [joinCodeInput,setJoinCodeInput]=useState("");
  const [joinCodeErr,setJoinCodeErr]=useState("");
  const [showTournament,setShowTournament]=useState(false);
  const [showArena,setShowArena]=useState(false);
  const [arenaCode,setArenaCode]=useState("");
  const [arenaMode,setArenaMode]=useState("1v1");
  const [arenaErr,setArenaErr]=useState("");
  const [tournamentData,setTournamentData]=useState({players:[],started:false,bracket:[],round:1});
  const [tInviteCode,setTInviteCode]=useState("");
  const [tInviteMsg,setTInviteMsg]=useState("");
  const [mInviteCode,setMInviteCode]=useState("");
  const [mInviteMsg,setMInviteMsg]=useState("");
  const [userCode,setUserCode]=useState("");
  const [leagueData,setLeagueData]=useState({league:'bronze',weeklyPts:0,weekKey:'',prevLeague:'bronze'});
  // Bildirim sistemi: Firebase'den gelen davet + arkadaşlık istekleri
  const [pendingNotifs,setPendingNotifs]=useState([]);
  const [incomingFriendReqs,setIncomingFriendReqs]=useState([]);
  const notifIdsRef=useRef(new Set()); // zaten gösterilen ID'leri izle (tekrar pop etme)

  // refs
  const USERS=useRef(new Map());
  const peerRef=useRef(null);
  const connsRef=useRef([]);
  const hostConnRef=useRef(null);
  const timerRef=useRef(null);
  const forceRef=useRef(null);
  const selRef=useRef(null); selRef.current=sel;
  const sel2Ref=useRef(null); sel2Ref.current=sel2;
  const usernameRef=useRef(""); usernameRef.current=username;
  const scoreRef=useRef(0);
  const isHostRef=useRef(false);
  const modeRef=useRef("solo"); modeRef.current=mode;
  const playersRef=useRef({});
  const answeredRef=useRef({});
  const questionsRef=useRef([]);
  const qIdxRef=useRef(0); qIdxRef.current=qIdx;
  const tlRef=useRef(15); tlRef.current=tl;
  const pwX2Ref=useRef(false); pwX2Ref.current=pwX2;
  const pwDoubleRef=useRef(false); pwDoubleRef.current=pwDouble;
  const sfxOnRef=useRef(true); sfxOnRef.current=sfxOn;
  const categoryRef=useRef("karışık"); categoryRef.current=category;
  const afkCountRef=useRef({});
  const pendingSfxRef=useRef(null);
  // Tekli mod combo bonus XP biriktirici — oyun bitince addXP'e ekleniyor
  const comboXpRef=useRef(0);
  const comboCountRef=useRef(0);comboCountRef.current=comboCount;
  const pingIntervalRef=useRef(null);

  const resetMultiplayerState=useCallback(()=>{
    if(peerRef.current){try{peerRef.current.destroy();}catch(e){}peerRef.current=null;}
    connsRef.current=[];
    hostConnRef.current=null;
    isHostRef.current=false;
    playersRef.current={};
    answeredRef.current={};
    setInviteLink("");
    setRoomCode("");
    setRoomPlayers([]);
    setConnStatus("idle");
    setCopied(false);
    setJoinCodeInput("");
    setJoinCodeErr("");
    setWaiting(false);
    setWaitCount({answered:0,total:1});
    setLiveScores({});
    setKickedPlayers([]);
  },[]);

  const goHome=useCallback(()=>{
    resetMultiplayerState();
    setMode("solo");
    setScreen("home");
  },[resetMultiplayerState]);

  // -- Load user --
  const loadUser=useCallback((u)=>{
    const xp=getTotalXP(u);
    const li=calcLevelInfo(xp);
    setTotalXP(xp); setLevelInfo(li);
    setGold(getGold(u));
    setPowers(getPowers(u));
    setStats(getStats(u));
    setMissions(getMissions(u));
    const dd=getDailyData(u);
    setDailyData(dd);
    setAvatar(getAvatar(u));
    setUserCode(getUserCode(u));
    setGmailInput(getGmail(u));
    setUserTitle(getTitleLS(u));
    setFriends(getFriends(u));
    getUserCode(u); // ensure code generated
    setLeagueData(getLeagueData(u));
  },[]);

  // -- Online ping --
  useEffect(()=>{
    if(!username)return;
    pingOnline(username);
    pingIntervalRef.current=setInterval(()=>pingOnline(usernameRef.current),30000);
    return()=>clearInterval(pingIntervalRef.current);
  },[username]);

  // -- Reveal SFX + Titreşim --
  const vibrateRef=useRef(true);vibrateRef.current=vibrateOn;
  const doVibrate=useCallback((pattern)=>{try{if(vibrateRef.current&&navigator.vibrate)navigator.vibrate(pattern);}catch(e){}},[]);
  useEffect(()=>{
    if(revealed&&pendingSfxRef.current!==null){
      if(sfxOnRef.current)playSfx(pendingSfxRef.current?'correct':'wrong');
      doVibrate(pendingSfxRef.current?[40]:[80,40,80]);
      pendingSfxRef.current=null;
    }
  },[revealed,doVibrate]);

  // -- Gold award on result --
  useEffect(()=>{
    if(screen!=="result")return;
    const lb=getLB();
    const myRank=lb.findIndex(p=>p.isMe);
    const rankGold=[100,50,25][myRank]||0;
    if(rankGold>0){
      if(sfxOnRef.current)playSfx('earn');
      setGold(g=>{const ng=g+rankGold;saveGoldLS(usernameRef.current,ng);return ng;});
      setGoldEarned(rankGold);
    }
    // XP from correct answers + tekli mod combo bonusu
    const correctCount=answers.filter(a=>a.sel===a.a).length;
    const totalXP=correctCount*5+(mode==='solo'?comboXpRef.current:0);
    if(totalXP>0) addXP(totalXP);
    // League puanı da ekle ve state'i güncelle
    if(totalXP>0){
      const u=usernameRef.current;
      addLeaguePts(u,totalXP);
      setLeagueData(getLeagueData(u));
      // Firebase league sync (async, hata olsa devam)
      try{
        const uid=(()=>{try{return localStorage.getItem("ba_fb_uid")||null;}catch(e){return null;}})();
        if(uid&&typeof fbAddLeaguePts!=="undefined"){
          const ld2=getLeagueData(u);
          fbAddLeaguePts(uid,u,ld2.league,totalXP).catch(()=>{});
        }
      }catch(e){}
    }
    // Update stats
    const ns=getStats(usernameRef.current);
    ns.games=(ns.games||0)+1;
    ns.correct=(ns.correct||0)+correctCount;
    if(myRank===0&&mode==='multi') ns.wins=(ns.wins||0)+1;
    // Category stats
    const catMap={bilim:'sci_correct',spor:'sport_correct',coğrafya:'geo_correct',tarih:'hist_correct',sanat:'art_correct'};
    if(catMap[categoryRef.current]) ns[catMap[categoryRef.current]]=(ns[catMap[categoryRef.current]]||0)+correctCount;
    setStats(ns);
    saveStatsLS(usernameRef.current,ns);
    checkMissions(ns,calcLevelInfo(getTotalXP(usernameRef.current)).level);
    // Daily
    triggerDaily('gameComplete');
    if(correctCount>0) triggerDaily('firstCorrect');
  },[screen]);

  // -- Music --
  useEffect(()=>{
    if(screen==="game"&&!musicStarted){setMusicStarted(true);if(musicOn)playMusic(Math.floor(Math.random()*5));}
    if((screen==="result"||screen==="home"||screen==="auth")&&musicStarted){stopMusic();setMusicStarted(false);}
  },[screen]);

  // -- Shuffle --
  useEffect(()=>{
    if(!questions[qIdx])return;
    const seed=usernameRef.current+String(qIdx);
    const sh=seededShuffle(questions[qIdx].o,seed);
    setShuffled(sh);
    if(pwElim){
      const wrong=sh.map((it,di)=>({di,i:it.i})).filter(x=>x.i!==questions[qIdx].a);
      setEliminated(wrong.slice(0,2).map(x=>x.di));
    } else setEliminated([]);
  },[qIdx,questions]);

  // -- addXP --
  const addXP=useCallback((amount)=>{
    const u=usernameRef.current;if(!u)return;
    const oldXP=getTotalXP(u);
    const newXP=oldXP+amount;
    setTotalXP(newXP);
    saveTotalXP(u,newXP);
    const oldLI=calcLevelInfo(oldXP);
    const newLI=calcLevelInfo(newXP);
    setLevelInfo(newLI);
    const queue=[];
    for(let lv=oldLI.level+1;lv<=newLI.level;lv++){
      const rewards=getLevelRewards(lv);
      queue.push({newLevel:lv,rewards});
      let g2=0;
      const np={...getPowers(u)};
      rewards.forEach(r=>{
        if(r.type==='gold'){g2+=r.amount;}
        if(r.type==='power'){np[r.pw]=(np[r.pw]||0)+1;}
      });
      if(g2>0){setGold(g=>{const ng=g+g2;saveGoldLS(u,ng);return ng;});}
      if(Object.values(np).some(v=>v>0)){setPowers(np);savePowersLS(u,np);}
    }
    if(queue.length>0)setLevelUpQueue(q=>[...q,...queue]);
  },[]);

  // -- checkMissions --
  const checkMissions=useCallback((ns,currentLevel)=>{
    const u=usernameRef.current;
    const ms=getMissions(u);
    let changed=false;
    MISSIONS_DEF.forEach(md=>{
      if(ms[md.id]==='done')return;
      const val=md.stat==='level'?currentLevel:(ns[md.stat]||0);
      if(val>=md.target){
        ms[md.id]='done';changed=true;
        addXP(md.xp);
        setGold(g=>{const ng=g+md.gold;saveGoldLS(u,ng);return ng;});
        if(md.title_reward){setUserTitle(md.title_reward);saveTitleLS(u,md.title_reward);}
      }
    });
    if(changed){setMissions({...ms});saveMissionsLS(u,ms);}
  },[addXP]);

  // -- triggerDaily --
  const triggerDaily=useCallback((event)=>{
    const u=usernameRef.current;if(!u)return;
    const dd=getDailyData(u);
    const def=DAILY_DEF.find(d=>d.event===event);
    if(!def||dd.done[def.id])return;
    const newDone={...dd.done,[def.id]:true};
    const newPts=(dd.pts||0)+def.pts;
    const shouldChest=newPts>=20&&!dd.chestClaimed;
    const newDD={done:newDone,pts:newPts,chestClaimed:dd.chestClaimed||shouldChest};
    setDailyData(newDD);
    saveDailyDataLS(u,newDD);
    if(shouldChest){
      setChestModal(true);
      setGold(g=>{const ng=g+100;saveGoldLS(u,ng);return ng;});
    }
  },[]);

  // -- AUTH --
  const handleAuth=useCallback(async()=>{
    setFErr("");setAuthLoading(true);
    const email=(fEmail||"").trim(),pass=(fPass||"").trim(),uname=(fUser||"").trim();
    if(authTab==="register"&&uname.length<3){setFErr("Kullanici adi min 3 karakter");setAuthLoading(false);return;}
    if(!email.includes("@")){setFErr("Gecerli e-posta girin");setAuthLoading(false);return;}
    if(pass.length<6){setFErr("Sifre min 6 karakter");setAuthLoading(false);return;}
    let result;
    try{
      if(typeof fbRegister!=="undefined"&&typeof firebase!=="undefined"&&firebase.apps&&firebase.apps.length){
        result=authTab==="register"?await fbRegister(email,pass,uname):await fbLogin(email,pass);
      }else{const u=uname||email.split("@")[0];result={ok:true,uid:"local_"+u,username:u};}
    }catch(e){result={ok:false,err:"Hata: "+e.message};}
    if(!result.ok){setFErr(result.err||"Hata olustu");setAuthLoading(false);return;}
    const u=result.username||(uname||email.split("@")[0]);
    setUsername(u);
    try{localStorage.setItem("ba_user",u);localStorage.setItem("ba_pass",pass);if(result.uid)localStorage.setItem("ba_fb_uid",result.uid);}catch(e){}
    loadUser(u);if(result.gold)setGold(result.gold);if(result.avatar)setAvatar(result.avatar);
    setTimeout(()=>triggerDaily("login"),400);
    const pending=sessionStorage.getItem("pendingRoom");
    if(pending){sessionStorage.removeItem("pendingRoom");joinAsClient(u,pending);}else setScreen("home");
    setAuthLoading(false);
  },[authTab,fUser,fPass,fEmail,authLoading]);

  const broadcast=(msg)=>{connsRef.current.forEach(c=>{try{c.send(msg);}catch(e){}});};

  // -- removePlayer --
  const removePlayer=useCallback((name)=>{
    if(!playersRef.current[name])return;
    delete playersRef.current[name];
    const list=Object.keys(playersRef.current);
    setRoomPlayers([...list]);setLiveScores({...playersRef.current});
    broadcast({type:"players",list});broadcast({type:"scores",data:{...playersRef.current}});
    const qI=qIdxRef.current;
    if(!answeredRef.current[qI])answeredRef.current[qI]=new Set();
    answeredRef.current[qI].add(name);
    const total=Object.keys(playersRef.current).length;
    if(total===0){broadcast({type:"gameOver"});setScreen("result");return;}
    if(answeredRef.current[qI].size>=total){clearTimeout(forceRef.current);doAdvance(qI);}
  },[]);

  // -- hostRecordAnswered --
  const hostRecordAnswered=useCallback((qI,name,wasAFK)=>{
    if(!answeredRef.current[qI])answeredRef.current[qI]=new Set();
    if(answeredRef.current[qI].has(name))return;
    answeredRef.current[qI].add(name);
    if(wasAFK){
      if(!afkCountRef.current[name])afkCountRef.current[name]=0;
      afkCountRef.current[name]++;
      if(afkCountRef.current[name]>=3){
        broadcast({type:"kicked",name});
        setKickedPlayers(kp=>[...kp,name]);
        removePlayer(name);return;
      }
    } else afkCountRef.current[name]=0;
    const total=Object.keys(playersRef.current).length;
    const answered=answeredRef.current[qI].size;
    broadcast({type:"waitCount",answered,total});
    setWaitCount({answered,total});
    if(answered>=total){clearTimeout(forceRef.current);doAdvance(qI);}
  },[removePlayer]);

  // -- doAdvance --
  const doAdvance=useCallback((qI)=>{
    clearTimeout(forceRef.current);
    broadcast({type:"reveal"});
    setRevealed(true);
    const nextQIdx=qI+1;
    setTimeout(()=>{
      if(nextQIdx>=questionsRef.current.length){
        broadcast({type:"gameOver"});
        setTimeout(()=>setScreen("result"),100);
      } else {
        broadcast({type:"advanceQ",newQIdx:nextQIdx});
        advanceToQ(nextQIdx);
      }
    },1800);
  },[]);

  const advanceToQ=useCallback((nqi)=>{
    setQIdx(nqi);setSel(null);setSel2(null);setTl(15);
    setFeedback(false);setRevealed(false);setWaiting(false);
    setPwDouble(false);setPwElim(false);setPwX2(false);setEliminated([]);
    pendingSfxRef.current=null;
    setWaitCount({answered:0,total:Object.keys(playersRef.current).length||1});
  },[]);

  // -- createRoom --
  const createRoom=useCallback(()=>{
    if(peerRef.current)peerRef.current.destroy();
    isHostRef.current=true;playersRef.current={[username]:0};answeredRef.current={};afkCountRef.current={};
    setRoomPlayers([username]);setLiveScores({[username]:0});setConnStatus("connecting");setKickedPlayers([]);setComboCount(0);
    const peer=new Peer();peerRef.current=peer;
    peer.on("open",id=>{const code=genRoomCode();setRoomCode(code);saveRoomCode(code,id);if(typeof fbSaveRoomCode!=="undefined"){fbSaveRoomCode(code,id).catch(()=>{});}setInviteLink(window.location.href.split("#")[0]+"#room="+id);setConnStatus("connected");setScreen("lobby-host");});
    peer.on("connection",conn=>{
      conn.on("open",()=>{connsRef.current.push(conn);conn.send({type:"welcome",host:usernameRef.current});});
      conn.on("data",msg=>{
        if(msg.type==="join"){playersRef.current[msg.name]=0;afkCountRef.current[msg.name]=0;const list=Object.keys(playersRef.current);setRoomPlayers([...list]);setLiveScores({...playersRef.current});broadcast({type:"players",list});}
        if(msg.type==="score"){playersRef.current[msg.name]=msg.score;setLiveScores({...playersRef.current});broadcast({type:"scores",data:{...playersRef.current}});}
        if(msg.type==="answered")hostRecordAnswered(msg.qIdx,msg.name,msg.wasAFK);
      });
      conn.on("close",()=>{connsRef.current=connsRef.current.filter(c=>c!==conn);});
    });
    peer.on("error",e=>{setConnStatus("error");});
    // Stats & daily
    const ns=getStats(username);ns.rooms=(ns.rooms||0)+1;setStats(ns);saveStatsLS(username,ns);
    triggerDaily('createRoom');
  },[username,hostRecordAnswered,triggerDaily]);

  // -- joinAsClient --
  const joinAsClient=useCallback((uname,hostPeerId)=>{
    isHostRef.current=false;setConnStatus("connecting");setScreen("lobby-guest");
    if(peerRef.current)peerRef.current.destroy();
    const peer=new Peer();peerRef.current=peer;
    peer.on("open",()=>{
      const conn=peer.connect(hostPeerId,{reliable:true});hostConnRef.current=conn;
      conn.on("open",()=>{conn.send({type:"join",name:uname||usernameRef.current});setConnStatus("connected");});
      conn.on("data",msg=>{
        if(msg.type==="welcome")setRoomPlayers([msg.host]);
        if(msg.type==="players")setRoomPlayers(msg.list);
        if(msg.type==="scores")setLiveScores(msg.data);
        if(msg.type==="waitCount")setWaitCount({answered:msg.answered,total:msg.total});
        if(msg.type==="reveal"){setRevealed(true);setFeedback(true);}
        if(msg.type==="kicked"&&msg.name===usernameRef.current){setScreen("home");alert("3 soruya cevap vermediğiniz için oyundan çıkarıldınız.");}
        if(msg.type==="start"){
          const pl=msg.players||[];const initS={};pl.forEach(p=>{initS[p]=0;});
          if(!initS[usernameRef.current])initS[usernameRef.current]=0;
          playersRef.current=initS;setWaitCount({answered:0,total:pl.length||1});
          launchGame(msg.questions,msg.qCount,"multi",pl,msg.category||"karışık");
        }
        if(msg.type==="advanceQ")advanceToQ(msg.newQIdx);
        if(msg.type==="gameOver")setTimeout(()=>setScreen("result"),100);
        if(msg.type==="rematch"){
          setQuestions([]);setQIdx(0);setScore(0);scoreRef.current=0;
          setAnswers([]);setSel(null);setSel2(null);setRevealed(false);setWaiting(false);setFeedback(false);
          setPwDouble(false);setPwElim(false);setPwX2(false);setEliminated([]);
          playersRef.current={};setLiveScores({});setGoldEarned(0);setKickedPlayers([]);
          setScreen("setup");
        }
      });
      conn.on("close",()=>setConnStatus("error"));
      conn.on("error",()=>setConnStatus("error"));
    });

          <div style={{background:"rgba(251,191,36,.08)",border:"1.5px solid rgba(251,191,36,.25)",borderRadius:12,padding:"11px",textAlign:"center",marginBottom:12}}>
            <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:26,fontWeight:700,color:"#fbbf24"}}>+{goldEarned} 🪙 · +{correct*5+(mode==='solo'?comboXpRef.current:0)} XP</div>
            {mode==='solo'&&comboXpRef.current>0&&(
              <div style={{marginTop:6,fontSize:12,fontWeight:700,color:"#ff4d6d"}}>🔥 Combo Bonus: +{comboXpRef.current} XP</div>
            )}
          </div>
        )}
        <div className="rstats">
          <div className="scard"><div className="sv" style={{color:"#34d399"}}>{correct}</div><div className="sl">Doğru</div></div>
          <div className="scard"><div className="sv" style={{color:"#f87171"}}>{wrong}</div><div className="sl">Yanlış</div></div>
          <div className="scard"><div className="sv" style={{color:"#7a9187"}}>{unanswered}</div><div className="sl">Boş</div></div>
        </div>
        {lb.length>0&&(
          <div className="lblist">
            <div className="lbtit">{lb.length>1?"🏆 Final Sıralaması":"📊 Sonuç"}</div>
            {lb.map((p,i)=>(
              <div key={i} className="lbrow" style={p.isMe?{border:"1px solid rgba(110,231,247,.2)"}:{}}>
                <span className="lbrank" style={{color:["#fbbf24","#cbd5e1","#cd7f32"][i]||"#7a9187"}}>{RANK_EMOJI[i]||i+1}</span>
                <span className="lbname" style={p.isMe?{color:"#34d399"}:{}}>{p.name}{p.isMe?" (Sen)":""}</span>
                <span className="lbscore">{p.score}</span>
              </div>
            ))}
          </div>
        )}
        {kickedPlayers.length>0&&<div style={{background:"rgba(248,113,113,.08)",border:"1px solid rgba(248,113,113,.2)",borderRadius:9,padding:"9px 12px",marginBottom:9,fontSize:11,color:"#f87171"}}>⚠️ AFK çıkarılanlar: {kickedPlayers.join(", ")}</div>}
        <div className="rbtns">
          <button className="pbtn" onClick={()=>{setGoldEarned(0);if(mode==="multi"&&isHostRef.current){broadcast({type:"rematch"});setMode("multi");}setScreen("setup");}}>🔁 Tekrar Oyna</button>
          <button className="sbtn" onClick={()=>setScreen("review")}>📖 Cevapları Gör</button>
          <button className="sbtn" onClick={goHome}>🏠 Ana Sayfa</button>
        </div>
      </div></W>
    );
  }

  if(screen==="review") return(
    <W><div className="sc fi">
      <div className="shdr"><button className="bk" onClick={()=>setScreen(answers.length?"result":"home")}>←</button><div className="stitle">Cevap Analizi</div></div>
      {answers.map((a,i)=>(
        <div key={i} className="ri">
          <div className="rqn">Soru {i+1}</div><div className="rqt">{a.q}</div>
          {a.o.map((o,j)=>{const isC=j===a.a,isS=j===a.sel||j===a.sel2;return(<div key={j} className={"ro"+(isC?" ca":isS?" wa":" na")}><span style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:700,fontSize:11}}>{LETTERS[j]}.</span><span style={{flex:1}}>{o}</span>{isC&&<span>✓</span>}{isS&&!isC&&<span>✗</span>}</div>);})}
          <div style={{marginTop:6,fontSize:10,color:"#7a9187"}}>{(a.sel===a.a||(a.sel2!=null&&a.sel2===a.a))?"✅ +"+a.pts+" puan":a.sel===null?"⏱️ Süre doldu":"❌ 0 puan"}</div>
        </div>
      ))}
      <button onClick={()=>{const txt="Bilgi Arenada "+score+" puan aldim! Sen de dene: https://erayylmzz732.github.io/bkk-arena";if(navigator.share){navigator.share({title:"Bilgi Arena",text:txt}).catch(()=>{});}else{try{navigator.clipboard.writeText(txt);}catch(e){}alert("Panoya kopyalandi!");}}} style={{width:"100%",background:"rgba(76,201,240,.1)",border:"1.5px solid #4cc9f0",borderRadius:12,padding:"11px",color:"#4cc9f0",fontWeight:700,cursor:"pointer",marginBottom:8,fontSize:14}}>Skoru Paylas</button>
        <button className="pbtn" style={{marginTop:0,marginBottom:14}} onClick={goHome}>Ana Sayfa</button>
    </div></W>
  );

  return null;

}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
<script>if("serviceWorker" in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("sw.js").catch(()=>{});});}</script>
</body>
</html>
